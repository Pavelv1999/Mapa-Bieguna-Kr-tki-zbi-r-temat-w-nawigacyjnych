<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karta Polaka — Подготовка к собеседованию</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --red-dark: #922B21;
    --red-light: #FADBD8;
    --cream: #FAF8F3;
    --white: #FFFFFF;
    --ink: #1A1A1A;
    --ink-mid: #444;
    --ink-light: #888;
    --border: #E8E2D9;
    --gold: #B7860B;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.7;
  }

  /* HERO */
  .hero {
    background: var(--red);
    color: white;
    padding: 60px 40px 50px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: 20%;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .hero-inner {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .hero-flag {
    display: flex;
    gap: 0;
    width: 48px;
    height: 32px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .hero-flag-white { width: 100%; height: 50%; background: white; }
  .hero-flag-red { width: 100%; height: 50%; background: var(--red-dark); }
  .hero-flag { display: block; }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .hero-sub {
    font-size: 16px;
    opacity: 0.85;
    max-width: 520px;
    font-weight: 300;
  }
  .hero-badge {
    display: inline-block;
    margin-top: 20px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
  }

  .hero-author {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }
  .hero-author-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500;
    flex-shrink: 0;
  }
  .hero-author-name {
    font-size: 15px;
    font-weight: 500;
  }
  .hero-author-role {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 1px;
  }

  /* LAYOUT */
  .main {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px 80px;
    display: flex;
    gap: 32px;
    align-items: flex-start;
  }

  /* SIDEBAR NAV */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    position: sticky;
    top: 20px;
    padding-top: 32px;
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 12px;
    padding-left: 12px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--ink-mid);
    transition: all 0.18s;
    margin-bottom: 2px;
    border: none;
    background: none;
    text-align: left;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-item:hover { background: white; color: var(--ink); }
  .nav-item.active { background: white; color: var(--red); font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .nav-icon { font-size: 15px; flex-shrink: 0; }
  .nav-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--ink-light);
    background: var(--border);
    padding: 1px 7px;
    border-radius: 10px;
  }
  .nav-item.active .nav-count { background: var(--red-light); color: var(--red); }

  /* CONTENT */
  .content {
    flex: 1;
    min-width: 0;
    padding-top: 32px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1.5px solid var(--border);
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 6px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
  }
  .section-desc {
    margin-top: 8px;
    font-size: 14px;
    color: var(--ink-light);
  }

  /* QA CARD */
  .qa-card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .qa-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

  .qa-head {
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    user-select: none;
  }
  .qa-head-left { flex: 1; min-width: 0; }
  .qa-num {
    font-size: 11px;
    font-weight: 500;
    color: var(--red);
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .qa-polish {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .qa-russian {
    font-size: 13px;
    color: var(--ink-light);
  }
  .qa-toggle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--cream);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
  }
  .qa-toggle svg { transition: transform 0.25s; }
  .qa-card.open .qa-toggle { background: var(--red); border-color: var(--red); }
  .qa-card.open .qa-toggle svg { transform: rotate(180deg); }
  .qa-card.open .qa-toggle svg path { stroke: white; }

  .qa-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .qa-card.open .qa-body { display: block; }

  .tabs-row {
    display: flex;
    gap: 4px;
    padding: 14px 22px 0;
    border-bottom: 1px solid var(--border);
    background: #FEFEFE;
  }
  .tab-btn {
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 500;
    border: none;
    background: none;
    color: var(--ink-light);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
  .tab-btn:hover { color: var(--ink); }

  .answer-panel { display: none; padding: 22px 22px 24px; }
  .answer-panel.active { display: block; }

  .answer-block {
    margin-bottom: 14px;
    padding: 16px 18px;
    border-radius: 8px;
    background: var(--cream);
    border-left: 3px solid var(--red);
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
  }
  .answer-block:last-child { margin-bottom: 0; }

  .translation-block {
    margin-bottom: 12px;
    padding: 14px 18px;
    border-radius: 8px;
    background: #F8F8F8;
    border-left: 3px solid var(--border);
    font-size: 14px;
    line-height: 1.65;
    color: var(--ink-mid);
  }

  .variants-wrap { }
  .variant-item {
    margin-bottom: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .variant-label {
    font-size: 12px;
    font-weight: 500;
    padding: 8px 14px;
    background: var(--red-light);
    color: var(--red-dark);
    letter-spacing: 0.04em;
  }
  .variant-text {
    padding: 14px;
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
  }
  .variant-tr {
    padding: 10px 14px;
    font-size: 13px;
    color: var(--ink-light);
    border-top: 1px solid var(--border);
  }

  .tip-box {
    margin-top: 16px;
    padding: 12px 16px;
    background: #FFFBEB;
    border: 1px solid #F5D76E;
    border-radius: 8px;
    font-size: 13px;
    color: #7D5A00;
    display: flex;
    gap: 10px;
  }
  .tip-box::before { content: '💡'; flex-shrink: 0; font-size: 15px; }

  /* MOBILE */
  .mobile-nav {
    display: none;
    overflow-x: auto;
    gap: 8px;
    padding: 16px 20px 0;
    scrollbar-width: none;
  }
  .mobile-nav::-webkit-scrollbar { display: none; }
  .mobile-nav-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-mid);
    white-space: nowrap;
  }
  .mobile-nav-btn.active { background: var(--red); color: white; border-color: var(--red); }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .mobile-nav { display: flex; }
    .main { padding: 0 16px 60px; }
    .hero { padding: 40px 20px 36px; }
  }
</style>
</head>

</div>

function buildNav() {
  const sidebar = document.getElementById('sidebarNav');
  const mobile = document.getElementById('mobileNav');
  sections.forEach((s, i) => {
    const total = s.questions.length;
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<span class="nav-icon">${s.icon}</span>${s.label}<span class="nav-count">${total}</span>`;
    btn.onclick = () => activateSection(i);
    sidebar.appendChild(btn);

    const mbtn = document.createElement('button');
    mbtn.className = 'mobile-nav-btn' + (i === 0 ? ' active' : '');
    mbtn.textContent = s.icon + ' ' + s.label;
    mbtn.onclick = () => activateSection(i);
    mobile.appendChild(mbtn);
  });
}

function buildContent() {
  const content = document.getElementById('content');
  sections.forEach((s, si) => {
    const sec = document.createElement('div');
    sec.className = 'section' + (si === 0 ? ' active' : '');
    sec.id = s.id;

    let html = `<div class="section-header">
      <div class="section-label">${s.icon} ${s.label}</div>
      <h2 class="section-title">${s.title}</h2>
      <p class="section-desc">${s.ru}</p>
    </div>`;

    s.questions.forEach((q, qi) => {
      const num = String(qi + 1).padStart(2, '0');
      html += `<div class="qa-card" id="${s.id}-q${qi}">
        <div class="qa-head" onclick="toggleCard('${s.id}-q${qi}')">
          <div class="qa-head-left">
            <div class="qa-num">Вопрос ${num}</div>
            <div class="qa-polish">${q.pl}</div>
            <div class="qa-russian">${q.ru}</div>
          </div>
          <div class="qa-toggle">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 4l4 4 4-4" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="qa-body">
          <div class="tabs-row">
            <button class="tab-btn active" onclick="switchTab('${s.id}-q${qi}', 'pl', this)">🇵🇱 По-польски</button>
            <button class="tab-btn" onclick="switchTab('${s.id}-q${qi}', 'tr', this)">🇷🇺 Перевод</button>
            ${q.variants.length > 0 ? `<button class="tab-btn" onclick="switchTab('${s.id}-q${qi}', 'alt', this)">💬 Варианты</button>` : ''}
          </div>
          <div class="answer-panel active" data-panel="${s.id}-q${qi}-pl">
            ${q.answers.map(a => `<div class="answer-block">${a}</div>`).join('')}
            ${q.tip ? `<div class="tip-box">${q.tip}</div>` : ''}
          </div>
          <div class="answer-panel" data-panel="${s.id}-q${qi}-tr">
            ${q.translations.map(t => `<div class="translation-block">${t}</div>`).join('')}
          </div>
          ${q.variants.length > 0 ? `<div class="answer-panel" data-panel="${s.id}-q${qi}-alt">
            <div class="variants-wrap">
              ${q.variants.map(v => `<div class="variant-item">
                <div class="variant-label">${v.label}</div>
                <div class="variant-text">${v.pl}</div>
                <div class="variant-tr">${v.ru}</div>
              </div>`).join('')}
            </div>
          </div>` : ''}
        </div>
      </div>`;
    });

    sec.innerHTML = html;
    content.appendChild(sec);
  });
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

function switchTab(cardId, panel, btn) {
  const card = document.getElementById(cardId);
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  card.querySelectorAll('.answer-panel').forEach(p => {
    p.classList.toggle('active', p.dataset.panel === `${cardId}-${panel}`);
  });
}

function activateSection(i) {
  document.querySelectorAll('.nav-item').forEach((b, j) => b.classList.toggle('active', i === j));
  document.querySelectorAll('.mobile-nav-btn').forEach((b, j) => b.classList.toggle('active', i === j));
  document.querySelectorAll('.section').forEach((s, j) => s.classList.toggle('active', i === j));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildNav();
buildContent();
</script>
